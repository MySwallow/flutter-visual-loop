name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Repo validation (bash + YAML + structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate.sh
        run: bash scripts/validate.sh

  sdk-test:
    name: SDK tests + analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - name: pub get
        working-directory: packages/flutter_visual_loop
        run: flutter pub get
      - name: analyze
        working-directory: packages/flutter_visual_loop
        run: flutter analyze --fatal-infos
      - name: test
        working-directory: packages/flutter_visual_loop
        run: flutter test

  example-build:
    name: Example app builds (debug APK)
    runs-on: ubuntu-latest
    needs: sdk-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Generate example platform scaffolding
        working-directory: example
        run: |
          flutter create . --platforms=android --org com.example.visualloop
          flutter pub get
      - name: Build debug APK
        working-directory: example
        run: flutter build apk --debug
